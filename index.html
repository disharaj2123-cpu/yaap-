<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f2027;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .splash-logo {
            font-size: 80px;
            margin-bottom: 10px;
            filter: drop-shadow(0px 0px 15px rgba(0, 255, 255, 0.8));
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .splash-text {
            font-size: 24px;
            color: #00e676;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 400px;
            text-align: center;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }

        .top-bar h2 { font-size: 20px; margin: 0; }

        .logout-btn {
            background: transparent;
            color: #ff4b2b;
            border: 1px solid #ff4b2b;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #ff4b2b;
            color: white;
            box-shadow: 0 0 10px #ff4b2b;
        }

        .timer-box {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        h1 { font-size: 28px; margin-bottom: 10px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-weight: bold;
        }

        .main-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
            transition: 0.2s;
            margin-top: 10px;
        }

        .main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
        }

        .puzzle-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 10px;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hidden { display: none !important; }

        #message {
            font-size: 15px;
            margin-bottom: 10px;
            height: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/135/135-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="success-sound">
        <source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="error-sound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-logo">🧩</div>
        <div class="splash-text">Created by Rajdeep Paul</div>
    </div>

    <!-- Login/Register Section -->
    <div id="login-section" class="game-container hidden">
        <h1>Puzzle Master</h1>
        <p>Login or Register to play</p>
        <input type="email" id="email" placeholder="Enter your valid Email">
        <input type="password" id="password" placeholder="Enter Password">
        <button class="main-btn" onclick="authenticateUser()">Login / Register</button>
    </div>

    <!-- Game Section -->
    <div id="game-section" class="game-container hidden">
        <div class="top-bar">
            <h2>Level: <span id="level-display">1</span></h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="timer-box">
            ⏳ <span id="time-left">60</span>s
        </div>
        
        <p id="message"></p>
        
        <div class="puzzle-box" id="puzzle-question"></div>

        <input type="number" id="answer" placeholder="Type answer here...">
        <button class="main-btn" onclick="checkAnswer()">Submit Answer</button>
    </div>

    <script>
        let currentLevel = 1;
        let correctAnswer = 0;
        let currentUserEmail = "";
        let timer;
        let timeLeft = 60;

        const bgMusic = document.getElementById("bg-music");
        const successSound = document.getElementById("success-sound");
        const errorSound = document.getElementById("error-sound");

        // Splash screen and Auto-Login logic
        window.onload = function() {
            setTimeout(() => {
                document.getElementById("splash-screen").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("splash-screen").classList.add("hidden");
                    
                    // Check if already logged in previously
                    let activeSession = localStorage.getItem("activeSession");
                    if (activeSession) {
                        currentUserEmail = activeSession;
                        loadGameDataAndStart();
                    } else {
                        document.getElementById("login-section").classList.remove("hidden");
                    }
                }, 1000);
            }, 3000);
        };

        // Strict Login and Password Verification
        function authenticateUser() {
            let emailInput = document.getElementById("email").value.trim().toLowerCase();
            let passInput = document.getElementById("password").value.trim();

            // Strict Email validation checking for @ and .
            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(emailInput)) {
                alert("Please enter a proper email address format! (e.g., yourname@gmail.com)");
                return;
            }

            if (passInput.length < 4) {
                alert("Password must be at least 4 characters long!");
                return;
            }

            // Check if user already exists in our local database
            let savedPass = localStorage.getItem("puzzlePass_" + emailInput);
            
            if (savedPass) {
                // User exists, verify password
                if (savedPass !== passInput) {
                    alert("Incorrect Password for this Email!");
                    return;
                }
            } else {
                // New User, register them
                localStorage.setItem("puzzlePass_" + emailInput, passInput);
                alert("New Account Created Successfully!");
            }

            // Save active session for auto-login later
            localStorage.setItem("activeSession", emailInput);
            currentUserEmail = emailInput;
            
            loadGameDataAndStart();
        }

        function loadGameDataAndStart() {
            let savedLevel = localStorage.getItem("puzzleLevel_" + currentUserEmail);
            currentLevel = savedLevel ? parseInt(savedLevel) : 1;

            bgMusic.volume = 0.3;
            bgMusic.play().catch(e => console.log("Audio play prevented by browser"));

            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("game-section").classList.remove("hidden");
            
            generatePuzzle();
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 60;
            document.getElementById("time-left").innerText = timeLeft;
            document.getElementById("time-left").style.color = "#ffcc00";

            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("time-left").innerText = timeLeft;

                if(timeLeft <= 10) {
                    document.getElementById("time-left").style.color = "#ff4b2b";
                }

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById("message").style.color = "#ffcc00";
                    document.getElementById("message").innerText = "Time Out! Changing math...";
                    setTimeout(() => generatePuzzle(), 1000);
                }
            }, 1000);
        }

        function generatePuzzle() {
            document.getElementById("level-display").innerText = currentLevel;
            document.getElementById("answer").value = "";
            document.getElementById("message").innerText = "";
            document.getElementById("answer").focus();

            startTimer();

            let multiplier = Math.ceil(currentLevel / 5); 
            let num1 = Math.floor(Math.random() * (10 * multiplier)) + 1;
            let num2 = Math.floor(Math.random() * (10 * multiplier)) + 1;
            
            let operators = ['+', '-', '*'];
            let op = operators[Math.floor(Math.random() * operators.length)];

            if (op === '-' && num1 < num2) {
                let temp = num1; num1 = num2; num2 = temp;
            }

            if (op === '+') correctAnswer = num1 + num2;
            if (op === '-') correctAnswer = num1 - num2;
            if (op === '*') correctAnswer = num1 * num2;

            document.getElementById("puzzle-question").innerText = `${num1} ${op} ${num2} = ?`;
            localStorage.setItem("puzzleLevel_" + currentUserEmail, currentLevel);
        }

        function checkAnswer() {
            let userAnswer = document.getElementById("answer").value;
            if (userAnswer === "") return;

            if (parseInt(userAnswer) === correctAnswer) {
                clearInterval(timer);
                successSound.currentTime = 0;
                successSound.play();
                document.getElementById("message").style.color = "#00ff00";
                document.getElementById("message").innerText = "Perfect! Proceeding...";
                
                setTimeout(() => {
                    currentLevel++;
                    generatePuzzle();
                }, 1000);
            } else {
                errorSound.currentTime = 0;
                errorSound.play();
                document.getElementById("message").style.color = "#ff4b2b";
                document.getElementById("message").innerText = "Wrong answer! Keep trying.";
            }
        }

        function logout() {
            clearInterval(timer);
            bgMusic.pause();
            bgMusic.currentTime = 0;
            
            // Remove active session so it asks for login next time
            localStorage.removeItem("activeSession");
            
            document.getElementById("game-section").classList.add("hidden");
            document.getElementById("login-section").classList.remove("hidden");
            
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
            currentUserEmail = "";
        }

        document.getElementById("answer").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkAnswer();
            }
        });
    </script>
</body>
</html>
